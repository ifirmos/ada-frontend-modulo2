<h2>{{ 'LOGIN.TITLE' | translate }}</h2>
<form (ngSubmit)="onSubmit()">
    <div>
        <label for="email">{{ 'LOGIN.EMAIL' | translate }}:</label>
        <input type="email" id="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required />
    </div>
    <div>
        <label for="password">{{ 'LOGIN.PASSWORD' | translate }}:</label>
        <input type="password" id="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" required />
    </div>
    <button type="submit">{{ 'LOGIN.SUBMIT' | translate }}</button>
    @if (errorMessage()) {
      <p>{{ errorMessage() }}</p>
    }
</form>
