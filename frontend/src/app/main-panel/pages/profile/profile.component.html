<section class="profile-root">
  <header class="profile-header">
    <div class="avatar-container">
      <div class="avatar">
        <span class="avatar-initials">{{ account()?.name?.charAt(0) ?? 'C' }}</span>
      </div>
      <div class="user-info">
        <h2>{{ account()?.name ?? ('COMMON.CLIENT' | translate) }}</h2>
        <p class="muted">{{ 'PROFILE.MEMBER_SINCE' | translate }} Mar 2024</p>
      </div>
    </div>
  </header>

  <nav class="profile-tabs">
    <a routerLink="dados" routerLinkActive="active">
      <span class="tab-icon">👤</span>
      {{ 'PROFILE.PERSONAL_DATA' | translate }}
    </a>
    <a routerLink="seguranca" routerLinkActive="active">
      <span class="tab-icon">🔒</span>
      {{ 'PROFILE.SECURITY' | translate }}
    </a>
  </nav>

  <div class="profile-content">
    <router-outlet></router-outlet>
  </div>
</section>
